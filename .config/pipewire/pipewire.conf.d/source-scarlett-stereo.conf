context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Scarlett Focusrite Line 1"
            filter.graph = {
                nodes = [
                    # input / output channels
                    { name = copyIL type = builtin label = copy }
                    { name = copyOL type = builtin label = copy }
                    { name = copyOR type = builtin label = copy }

                    # gain adjustment
                    { type = ladspa plugin = "/usr/lib64/ladspa/lsp-plugins-ladspa.so" label = "http://lsp-plug.in/plugins/ladspa/loud_comp_mono" name = loudness control = { "Output volume (dB)" = 8 } }
                ]
                links = [
                    # apply gain
                    { output = "copyIL:Out" input = "loudness:Input" }

                    # copy to both channels
                    { output = "loudness:Output" input = "copyOL:In" }
                    { output = "loudness:Output" input = "copyOR:In" }
                ]
                inputs  = [ "copyIL:In" ]
                outputs = [ "copyOL:Out" "copyOR:Out" ]
            }
            capture.props = {
                node.name         = "remap_input.scarlett-line-1"
                audio.position    = [ FL ]
                stream.dont-remix = true
                node.target = "alsa_input.usb-Focusrite_Scarlett_2i2_USB_Y8EHD0D084B86C-00.HiFi__Mic1__source"
                node.passive = true
            }
            playback.props = {
                node.name         = "remap_output.scarlett-line-1"
                audio.position    = [ FL FR ]
                media.class       = "Audio/Source"
            }
        }
    }
]
