[fedora]
image=quay.io/fedora/fedora-toolbox:43 
pre_init_hooks="sudo rpm --import https://packages.microsoft.com/keys/microsoft.asc && echo -e \"[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\nautorefresh=1\ntype=rpm-md\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc\" | sudo tee /etc/yum.repos.d/vscode.repo > /dev/null"
additional_packages="code"
exported_apps="code"
additional_packages="du-dust"
exported_bins="/usr/bin/dust"
pre_init_hooks="sudo dnf group install -y development-tools"
additional_packages="rpmdevtools rpmlint"
additional_packages="python3 python3-setuptools python3-pyusb python3-colorlog python3-crcmod python3-hidapi python3-docopt python-pillow python3-i2c-tools libusbx python3-setuptools_scm python3-pip python3-pytest python3-devel"
additional_packages="libdrm-devel protobuf-devel cargo-rpm-macros"
additional_packages="nodejs"
additional_packages="dotnet-sdk-10.0"
additional_packages="ruby ruby-devel"
init_hooks="gem update"
pull=true
root=false
replace=true
start_now=true
